<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔒 独家暗语 · 主持人筛选 + 倒计时</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a14;
            --bg-panel: #11111f;
            --bg-card: #1a1a2c;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0c0;
            --accent: #e94560;
            --accent-hover: #ff6b7c;
            --accent2: #00d2ff;
            --gold: #f0c060;
            --green: #4caf84;
            --red: #ff4757;
            --border-light: rgba(255,255,255,0.08);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.5);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.6);
            --radius-lg: 28px;
            --radius-md: 20px;
            --radius-sm: 14px;
            --whiteboard-bg: #fff9e8;
            --whiteboard-text: #3a2c1f;
            --whiteboard-border: #d4c5a9;
            --announce-bg: rgba(0,0,0,0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Roboto', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(ellipse at 20% 30%, rgba(233,69,96,0.12) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 70%, rgba(0,210,255,0.08) 0%, transparent 60%);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .app {
            width: 100%;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .header {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 18px 28px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .header h1 {
            font-family: 'Pacifico', 'Ma Shan Zheng', cursive;
            font-size: 2.4rem;
            font-weight: normal;
            background: linear-gradient(135deg, #e94560, #f0c060, #00d2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .room-info {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .room-badge {
            background: rgba(0,210,255,0.1);
            border: 1px solid rgba(0,210,255,0.3);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .connection-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
            margin-right: 6px;
        }
        .connection-dot.disconnected { background: #ff4757; }
        .timer {
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--gold);
        }
        .announcement {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--announce-bg);
            backdrop-filter: blur(12px);
            color: var(--gold);
            padding: 12px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            border-left: 4px solid var(--gold);
            border-right: 4px solid var(--gold);
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            white-space: nowrap;
            max-width: 90vw;
            overflow-x: auto;
            font-family: monospace;
            animation: fadeInOut 5s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 28px;
        }
        .game-area {
            background: var(--bg-panel);
            border-radius: var(--radius-lg);
            padding: 32px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .panel-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 12px;
        }
        .word-display {
            background: rgba(0,0,0,0.4);
            border: 2px dashed var(--accent2);
            border-radius: var(--radius-md);
            padding: 28px;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
        }
        .word-hidden {
            color: transparent;
            text-shadow: 0 0 12px rgba(255,255,255,0.4);
        }
        .clue-input-row, .guess-input-row {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .clue-input-row input, .guess-input-row input {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
        }
        .clue-input-row input:focus, .guess-input-row input:focus {
            border-color: var(--accent2);
            outline: none;
        }
        .clue-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 16px;
            min-height: 100px;
        }
        .clue-tag {
            background: var(--whiteboard-bg);
            color: var(--whiteboard-text);
            padding: 14px 24px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 1.3rem;
            border: 2px solid var(--whiteboard-border);
            display: inline-flex;
            align-items: center;
            gap: 14px;
            transition: 0.1s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-family: 'Ma Shan Zheng', cursive;
        }
        .clue-tag.filter-keep {
            background: rgba(76,175,132,0.3);
            border-color: var(--green);
            color: white;
        }
        .clue-tag.filter-hide {
            background: rgba(255,71,87,0.3);
            border-color: var(--red);
            color: white;
        }
        .clue-tag.eliminated .clue-text,
        .clue-tag.hidden-by-host .clue-text {
            text-decoration: line-through;
            opacity: 0.7;
        }
        .clue-tag.eliminated,
        .clue-tag.hidden-by-host {
            opacity: 0.7;
        }
        .clue-provider-avatar {
            font-size: 1.4rem;
            filter: none;
            text-decoration: none;
        }
        .btn {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            border: none;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .btn-secondary { background: var(--accent2); color: #111; }
        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.2); color: #ccc; }
        .btn-outline:hover { border-color: white; color: white; }
        .btn-danger { background: #ff4757; padding: 4px 12px; font-size: 0.8rem; border-radius: 30px; }
        .btn-success { background: var(--green); padding: 4px 12px; font-size: 0.8rem; border-radius: 30px; }
        .btn-icon {
            padding: 4px 8px;
            margin-left: 6px;
            font-size: 1rem;
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 20px;
            transition: 0.1s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .btn-icon-transfer { color: var(--gold); }
        .btn-icon-spectator { color: #ff4757; }
        .btn-icon-player { color: var(--green); }
        .score-round {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.3);
            padding: 12px 20px;
            border-radius: var(--radius-md);
        }
        .score-display {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .round-display {
            font-size: 1.2rem;
            color: var(--gold);
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .players-panel {
            background: var(--bg-panel);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border-light);
        }
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .player-category {
            margin-top: 8px;
        }
        .player-category-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .player-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .player-card {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
        }
        .player-card.me {
            border-color: var(--gold);
            background: rgba(240,192,96,0.15);
        }
        .player-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-card);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-panel {
            background: var(--bg-panel);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border-light);
        }
        .chat-messages {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-sm);
            padding: 12px;
            min-height: 200px;
            max-height: 280px;
            overflow-y: auto;
        }
        .chat-input-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .chat-input-row input {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .chat-input-row button {
            padding: 10px 16px;
            background: var(--accent2);
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
        }
        .empty-state { text-align: center; padding: 24px; color: var(--text-secondary); }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .hidden { display: none !important; }
        .phase-indicator {
            text-align: center;
            font-size: 0.85rem;
            background: rgba(240,192,96,0.15);
            padding: 4px 12px;
            border-radius: 40px;
            color: var(--gold);
        }
        [data-tooltip] {
            position: relative;
            cursor: pointer;
        }
        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            white-space: nowrap;
            z-index: 100;
            display: none;
        }
        [data-tooltip]:hover:before {
            display: block;
        }
        /* 主持人设定词语面板 */
        .host-word-panel {
            background: rgba(0,0,0,0.4);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-top: 8px;
        }
        .host-word-input-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .host-word-input-row input {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-light);
            color: white;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🔒 独家暗语 · Just One</h1>
            <div class="room-info">
                <div class="room-badge"><span class="connection-dot" id="connDot"></span><span id="connText">等待连接...</span></div>
                <span id="roomIdDisplay" style="font-family:monospace;"></span>
                <span class="timer" id="timer">--:--</span>
                <span id="phaseIndicator" class="phase-indicator hidden">⏳ 等待游戏开始...</span>
            </div>
        </div>
        <div class="main-content">
            <div class="panel game-area">
                <div class="panel-title"><span>🎯</span> 游戏区</div>
                <div class="word-display" id="wordDisplay">等待开始...</div>
                <!-- 线索提交阶段 -->
                <div id="clueSection" class="hidden">
                    <div id="clueInputArea">
                        <div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:8px;">📝 输入你的线索（一个词）</div>
                        <div class="clue-input-row">
                            <input type="text" id="clueInput" placeholder="输入线索词..." maxlength="20" autocomplete="off">
                            <button class="btn btn-secondary" id="clueSubmitBtn">提交</button>
                        </div>
                    </div>
                    <div id="submittedStatus" class="submitted-status hidden">✅ 已提交线索，等待其他玩家...</div>
                    <div class="clue-list" id="clueList"></div>
                </div>
                <!-- 主持人筛选阶段 -->
                <div id="hostFilterSection" class="hidden">
                    <div class="panel-title" style="font-size:1.2rem;">🎬 主持人筛选线索</div>
                    <div style="margin-bottom: 12px;">点击按钮切换 保留✅ / 隐藏❌（隐藏后猜词者看不到）</div>
                    <div class="clue-list" id="filterClueList"></div>
                    <div class="btn-row" style="margin-top: 20px;">
                        <button class="btn btn-primary" id="confirmFilterBtn">✅ 确认筛选，进入猜词</button>
                    </div>
                </div>
                <!-- 猜词阶段 -->
                <div id="guessSection" class="hidden">
                    <div style="font-size:0.8rem; margin-bottom:8px;">🤔 根据线索猜词（限时30秒）</div>
                    <div class="guess-input-row">
                        <input type="text" id="guessInput" placeholder="输入你的猜测..." maxlength="20" autocomplete="off">
                        <button class="btn btn-primary" id="guessSubmitBtn">提交猜测</button>
                    </div>
                </div>
                <!-- 主持人判定阶段 -->
                <div id="hostJudgeSection" class="hidden">
                    <div class="panel-title" style="font-size:1.2rem;">🎬 主持人判定猜词结果</div>
                    <div id="judgeInfo" style="margin-bottom: 12px; font-size: 1.1rem;"></div>
                    <div class="btn-row" style="justify-content: center; gap: 20px;">
                        <button class="btn btn-success" id="judgeCorrectBtn">✅ 正确 (+1分)</button>
                        <button class="btn btn-danger" id="judgeWrongBtn">❌ 错误 (不得分)</button>
                    </div>
                </div>
                <!-- 结果阶段 -->
                <div id="resultSection" class="hidden">
                    <div style="text-align:center; font-size:1.2rem;" id="resultText"></div>
                    <div class="btn-row" style="justify-content:center; margin-top:20px;">
                        <button class="btn btn-primary" id="nextRoundBtn" style="display:none;">▶️ 下一轮</button>
                    </div>
                </div>
                <!-- 得分 & 轮次 -->
                <div class="score-round">
                    <div class="score-display" id="scoreDisplay">⭐ 得分: 0</div>
                    <div class="round-display" id="roundDisplay"></div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-primary hidden" id="startGameBtn">🚀 开始游戏</button>
                    <button class="btn btn-outline hidden" id="leaveGameBtn">🚪 返回大厅</button>
                </div>
                <!-- 主持人手动设定词语面板（仅在游戏进行中且主机可见） -->
                <div id="hostWordPanel" class="host-word-panel hidden">
                    <div class="panel-title" style="font-size:1rem;">✏️ 主持人设定本轮词语</div>
                    <div class="host-word-input-row">
                        <input type="text" id="hostWordInput" placeholder="输入本轮要猜的词语（留空则从词库随机）" maxlength="20">
                        <button class="btn btn-secondary" id="setWordBtn">设定词语</button>
                    </div>
                </div>
            </div>
            <div class="side-panel">
                <div class="players-panel">
                    <div class="panel-title"><span>👥</span> 玩家列表</div>
                    <div id="playersListContainer"></div>
                </div>
                <div id="chatPanel" class="chat-panel">
                    <div class="panel-title"><span>💬</span> 聊天</div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chatInput" placeholder="输入消息... 主持人可用 \\all 内容 发布公告" maxlength="200">
                        <button id="chatSendBtn">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

            function toggleHostHide(pid, clueText) {
                if (!amHost) return;
                if (!gameState.hostHiddenClues) gameState.hostHiddenClues = {};

                if (gameState.hostHiddenClues[key]) { delete gameState.hostHiddenClues[key]; showToast(`已恢复线索: ${clueText}`); }
                else { gameState.hostHiddenClues[key] = true; showToast(`已隐藏线索: ${clueText}`); }
                broadcastState();
                if (gameState.phase === 'host_filter') renderFilterList();

            function isHiddenByHost(pid, clue) {
                if (!gameState || !gameState.hostHiddenClues) return false;

            function convertToSpectator(targetPeerId) {

                gameState.players[targetPeerId].spectator = true;
                if (gameState.guesserPeerId === targetPeerId && gameState.phase !== 'lobby' && gameState.phase !== 'ended') {
                    const joinedPlayers = Object.entries(gameState.players).filter(([pid,p])=>p.joined);
                    if (joinedPlayers.length > 0) {
                        gameState.guesserPeerId = joinedPlayers[0][0];

                    } else {

                        }).join('');

                }).join('');

                        hostJudgeSection.classList.remove('hidden');
                        const guesserName = gameState.players[gameState.guesserPeerId]?.name || '猜词者';
                        const guessedWord = gameState.pendingGuess || '';
                        judgeInfo.innerHTML = `猜词者 <strong>${escapeHtml(guesserName)}</strong> 猜测的是：<span style="font-size:1.3rem;">“${escapeHtml(guessedWord)}”</span><br>请判定是否正确`;
                    } else {
                        clueSection.classList.remove('hidden');
                        clueInputArea.classList.add('hidden');
                        submittedStatus.classList.add('hidden');
                        clueList.innerHTML = '<div class="empty-state">🎬 主持人正在判定猜词结果，请稍候...</div>';
                    }
                } else if (phase === 'result') {
                    clueSection.classList.remove('hidden');
                    clueInputArea.classList.add('hidden');
                    submittedStatus.classList.add('hidden');
                    nextRoundBtn.style.display = amHost ? 'inline-block' : 'none';
                }
                renderClueList();
            }
            function renderResult() {
                resultSection.classList.add('hidden');
                if (!gameState || gameState.phase !== 'result') return;
                resultSection.classList.remove('hidden');
                const guesserName = gameState.players[gameState.guesserPeerId]?.name || '猜词者';
                const guessedWord = gameState.lastGuess || '';
                const isCorrect = gameState.lastResult === 'correct';
                if (isCurrentGuesser() || (myInfo.spectator && !amHost)) {
                    if (isCorrect) resultText.innerHTML = `✅ 猜对了！答案就是“${escapeHtml(gameState.currentWord)}”`;
                    else resultText.innerHTML = `❌ 猜错啦！不是“${escapeHtml(guessedWord)}”哦`;
                } else {
                    if (isCorrect) resultText.innerHTML = `🎉 ${escapeHtml(guesserName)} 猜对了！答案就是“${escapeHtml(gameState.currentWord)}”`;
                    else resultText.innerHTML = `😢 ${escapeHtml(guesserName)} 猜的是“${escapeHtml(guessedWord)}”——猜错啦！`;
                }
            }
            function renderScoreAndRound() {
                if (!gameState) {
                    scoreDisplay.textContent = '⭐ 得分: 0';
                    roundDisplay.textContent = '';
                    return;
                }
                scoreDisplay.textContent = `⭐ 得分: ${gameState.score}`;
                if (gameState.phase === 'lobby' || gameState.phase === 'ended') {
                    roundDisplay.textContent = '';
                } else {
                    const currentRound = gameState.round + 1;
                    const totalRounds = gameState.wordList.length;
                    roundDisplay.textContent = `第 ${currentRound} / ${totalRounds} 轮`;
                }
            }
            function renderPlayersList() {
                if (!gameState || !gameState.players) {
                    playersListContainer.innerHTML = '<div class="empty-state">等待玩家加入...</div>';
                    return;
                }
                const players = gameState.players;
                const hostId = Object.keys(players).find(pid => amHost && pid === myPeerId) || (amHost ? myPeerId : null);
                const guesserId = gameState.guesserPeerId;
                const providers = Object.entries(players).filter(([pid, p]) => p.joined && pid !== guesserId && (!amHost || pid !== myPeerId));
                const spectators = Object.entries(players).filter(([pid, p]) => p.spectator && (!amHost || pid !== myPeerId));
                
                let html = '<div class="player-list">';
                if (amHost && players[myPeerId]) {
                    const p = players[myPeerId];
                    html += `<div class="player-category"><div class="player-category-title">🎤 主持人</div><div class="player-group"><div class="player-card me"><span class="player-avatar">${getPlayerAvatarEmoji(myPeerId)}</span><span>${escapeHtml(p.name)}</span></div></div></div>`;
                } else if (hostId && players[hostId]) {
                    html += `<div class="player-category"><div class="player-category-title">🎤 主持人</div><div class="player-group"><div class="player-card"><span class="player-avatar">${getPlayerAvatarEmoji(hostId)}</span><span>${escapeHtml(players[hostId].name)}</span></div></div></div>`;
                }
                if (guesserId && players[guesserId]) {
                    const p = players[guesserId];
                    const meClass = (guesserId === myPeerId) ? 'me' : '';
                    html += `<div class="player-category"><div class="player-category-title">🔍 猜词者</div><div class="player-group"><div class="player-card ${meClass}"><span class="player-avatar">${getPlayerAvatarEmoji(guesserId)}</span><span>${escapeHtml(p.name)}</span>`;
                    if (amHost && guesserId !== myPeerId) {
                        html += `<button class="btn-icon btn-icon-spectator" data-pid="${guesserId}" data-action="spectator" data-tooltip="转为观众">↩️</button>`;
                        html += `<button class="btn-icon btn-icon-transfer" data-pid="${guesserId}" data-action="transfer" data-tooltip="转为主持人">👑</button>`;
                    }
                    html += `</div></div></div>`;
                }
                if (providers.length > 0) {
                    html += `<div class="player-category"><div class="player-category-title">✏️ 提供线索</div><div class="player-group" style="display: flex; flex-wrap: wrap; gap: 8px;">`;
                    providers.forEach(([pid, p]) => {
                        const meClass = (pid === myPeerId) ? 'me' : '';
                        html += `<div class="player-card ${meClass}" style="width: calc(50% - 8px);"><span class="player-avatar">${getPlayerAvatarEmoji(pid)}</span><span>${escapeHtml(p.name)}</span>`;
                        if (amHost && pid !== myPeerId) {
                            html += `<button class="btn-icon btn-icon-spectator" data-pid="${pid}" data-action="spectator" data-tooltip="转为观众">↩️</button>`;
                            html += `<button class="btn-icon btn-icon-transfer" data-pid="${pid}" data-action="transfer" data-tooltip="转为主持人">👑</button>`;
                        }
                        html += `</div>`;
                    });
                    html += `</div></div>`;
                }
                if (spectators.length > 0) {
                    html += `<div class="player-category"><div class="player-category-title">👀 旁观</div><div class="player-group" style="display: flex; flex-wrap: wrap; gap: 8px;">`;
                    spectators.forEach(([pid, p]) => {
                        const meClass = (pid === myPeerId) ? 'me' : '';
                        html += `<div class="player-card ${meClass}" style="width: calc(33.33% - 8px);"><span class="player-avatar">${getPlayerAvatarEmoji(pid)}</span><span>${escapeHtml(p.name)}</span>`;
                        if (amHost && pid !== myPeerId) {
                            html += `<button class="btn-icon btn-icon-player" data-pid="${pid}" data-action="player" data-tooltip="加入游戏">➕</button>`;
                            html += `<button class="btn-icon btn-icon-transfer" data-pid="${pid}" data-action="transfer" data-tooltip="转为主持人">👑</button>`;
                        }
                        html += `</div>`;
                    });
                    html += `</div></div>`;
                }
                html += `</div>`;
                playersListContainer.innerHTML = html;
                document.querySelectorAll('[data-action="spectator"]').forEach(btn => {
                    btn.onclick = () => { const pid = btn.dataset.pid; convertToSpectator(pid); };
                });
                document.querySelectorAll('[data-action="player"]').forEach(btn => {
                    btn.onclick = () => { const pid = btn.dataset.pid; convertToPlayer(pid); };
                });
                document.querySelectorAll('[data-action="transfer"]').forEach(btn => {
                    btn.onclick = () => { const pid = btn.dataset.pid; transferHost(pid); };
                });
            }
            function addChatMessage(sender, text, timestamp, senderId) {
                if (senderId && senderId === myPeerId) return;
                chatHistory.push({sender, text, timestamp}); if(chatHistory.length>100) chatHistory.shift(); renderChatMessages();
            }
            function renderChatMessages() {
                chatMessages.innerHTML = chatHistory.map(m => `<div class="chat-msg"><span class="sender">${escapeHtml(m.sender)}:</span>${escapeHtml(m.text)}<span style="font-size:0.6rem;color:#777;margin-left:4px;">${new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>`).join('');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            function handleChatSend() {
                let text = chatInput.value.trim();
                if (!text) return;
                if (amHost && text.startsWith('\\all')) {
                    let announceText = text.slice(5).trim();
                    if (announceText) {
                        showAnnouncement(announceText, myInfo.name);
                        addChatMessage("系统", `📢 主持人公告：${announceText}`, Date.now(), null);
                        const msg = { type: 'announce', text: announceText, senderName: myInfo.name };
                        broadcastToClients(msg);
                        chatInput.value = '';
                        return;
                    } else {
                        showToast("格式：\\all 公告内容");
                        return;
                    }
                }
                const timestamp = Date.now();
                const msg = { type: 'chat', sender: myInfo.name, text, timestamp, senderId: myPeerId };
                chatInput.value = '';
                addChatMessage(myInfo.name, text, timestamp, myPeerId);
                if (amHost) broadcastToClients(msg);
                else sendToHost(msg);
            }
            function handleIncomingChat(data){
                if(data.senderId===myPeerId) return;
                if (data.type === 'announce') {
                    showAnnouncement(data.text, data.senderName);
                    addChatMessage("系统", `📢 ${data.senderName} 公告：${data.text}`, Date.now(), null);
                } else {
                    addChatMessage(data.sender, data.text, data.timestamp, data.senderId);
                }
            }
            function renderAll() { renderWord(); renderClueSection(); renderResult(); renderScoreAndRound(); renderPlayersList(); renderChatMessages(); if(amHost && gameState && gameState.phase==='lobby') startGameBtn.classList.remove('hidden'); else startGameBtn.classList.add('hidden'); }
            function getFullState() {
                return {
                    players: gameState.players,
                    phase: gameState.phase,
                    round: gameState.round,
                    score: gameState.score,
                    currentWord: gameState.currentWord,
                    clues: gameState.clues,
                    eliminatedClues: gameState.eliminatedClues,
                    guesserPeerId: gameState.guesserPeerId,
                    lastResult: gameState.lastResult,
                    lastGuess: gameState.lastGuess,
                    pendingGuess: gameState.pendingGuess,
                    wordList: gameState.wordList,
                    hostHiddenClues: gameState.hostHiddenClues || {},
                    timerRemaining: timerRemaining
                };
            }
            function broadcastState() { if(amHost){ const state=getFullState(); hostClientConns.forEach(c=>{if(c.open) c.send({type:'gameState',state});}); renderAll(); } }
            function applyGameState(state) {
                gameState = {
                    players: state.players || {},
                    phase: state.phase || 'lobby',
                    round: state.round || 0,
                    score: state.score || 0,
                    currentWord: state.currentWord || '',
                    clues: state.clues || {},
                    eliminatedClues: state.eliminatedClues || {},
                    guesserPeerId: state.guesserPeerId || null,
                    lastResult: state.lastResult || null,
                    lastGuess: state.lastGuess || '',
                    pendingGuess: state.pendingGuess || '',
                    wordList: state.wordList || [],
                    hostHiddenClues: state.hostHiddenClues || {}
                };
                setPhase(gameState.phase);
                renderAll();
                if (!amHost && state.timerRemaining !== undefined && state.timerRemaining > 0) syncTimer(state.timerRemaining);
                else if (!amHost) stopTimer();
            }
            function hostOnClueTimeout() { if (!amHost || gameState.phase !== 'clue') return; stopTimer(); gameState.phase = 'host_filter'; broadcastState(); showToast('线索提交时间到，进入主持人筛选阶段'); }
            function hostOnGuessTimeout() { if (!amHost || gameState.phase !== 'guess') return; hostProcessGuessTimeout(); }
            function hostProcessGuessTimeout() {
                if (!amHost || gameState.phase !== 'guess') return;
                gameState.pendingGuess = '';
                gameState.lastResult = 'pass';
                gameState.lastGuess = '(超时跳过)';
                gameState.wordList.shift();
                if(gameState.wordList.length>0) gameState.wordList.shift();
                gameState.phase = 'result';
                broadcastState();
                stopTimer();
                showToast('猜词超时，已跳过');
            }
            function hostStartGame() {
                if (!amHost) return;
                const joinedPlayers = Object.entries(gameState.players).filter(([pid,p])=>p.joined);
                if (joinedPlayers.length < 2) { showToast('至少需要2名玩家（不含主持人）才能开始'); return; }
                const wordList = getRandomWords(13);
                const guesserOrder = joinedPlayers.map(([pid]) => pid);
                const firstGuesser = guesserOrder[Math.floor(Math.random() * guesserOrder.length)];
                gameState.wordList = wordList; gameState.round = 0; gameState.score = 0; gameState.phase = 'clue';
                gameState.currentWord = wordList[0]; gameState.clues = {}; gameState.eliminatedClues = {};
                gameState.guesserPeerId = firstGuesser; gameState.lastResult = null; gameState.lastGuess = ''; gameState.pendingGuess = ''; gameState.hostHiddenClues = {};
                broadcastState();
                startTimer(TIMER_CLUE, () => hostOnClueTimeout());
            }
            function hostProcessClues() {
                if (!amHost || gameState.phase !== 'clue') return;
                const providers = Object.entries(gameState.players).filter(([pid,p])=>p.joined && pid !== gameState.guesserPeerId);
                const allSubmitted = providers.every(([pid])=>gameState.clues.hasOwnProperty(pid));
                if (!allSubmitted) return;
                stopTimer();
                gameState.phase = 'host_filter';
                broadcastState();
                showToast('所有玩家已提交线索，主持人请筛选');
            }
            function hostConfirmFilter() {
                if (!amHost || gameState.phase !== 'host_filter') return;
                const clueCounts = {};
                Object.values(gameState.clues).forEach(clue=>{ const norm=normalizeClue(clue); clueCounts[norm]=(clueCounts[norm]||0)+1; });
                gameState.eliminatedClues = {};
                Object.entries(gameState.clues).forEach(([pid,clue])=>{ const norm=normalizeClue(clue); if(clueCounts[norm]>1) gameState.eliminatedClues[clue]=true; });
                gameState.phase = 'guess';
                broadcastState();
                startTimer(TIMER_GUESS, () => hostOnGuessTimeout());
            }
            function hostReceiveGuess(guess) {
                if (!amHost) return;
                stopTimer();
                gameState.pendingGuess = guess.trim();
                gameState.phase = 'host_judge';
                broadcastState();
            }
            function hostJudge(isCorrect) {
                if (!amHost || gameState.phase !== 'host_judge') return;
                const correct = isCorrect;
                gameState.lastResult = correct ? 'correct' : 'wrong';
                gameState.lastGuess = gameState.pendingGuess;
                if (correct) gameState.score++;
                else { gameState.wordList.shift(); if(gameState.wordList.length>0) gameState.wordList.shift(); }
                gameState.pendingGuess = '';
                gameState.phase = 'result';
                broadcastState();
            }
            function hostNextRound() {
                if (!amHost) return;
                if (gameState.wordList.length === 0 || gameState.round >= 12) { gameState.phase = 'ended'; broadcastState(); stopTimer(); return; }
                gameState.round++;
                gameState.currentWord = gameState.wordList[0];
                gameState.clues = {};
                gameState.eliminatedClues = {};
                gameState.lastResult = null;
                gameState.lastGuess = '';
                gameState.pendingGuess = '';
                gameState.hostHiddenClues = {};
                const joined = Object.entries(gameState.players).filter(([pid,p])=>p.joined).map(([pid])=>pid);
                const curIdx = joined.indexOf(gameState.guesserPeerId);
                const nextIdx = (curIdx + 1) % joined.length;
                gameState.guesserPeerId = joined[nextIdx];
                gameState.phase = 'clue';
                broadcastState();
                startTimer(TIMER_CLUE, () => hostOnClueTimeout());
            }
            function sendToHost(data){ if(hostConn && hostConn.open) hostConn.send(data); }
            function broadcastToClients(data){ hostClientConns.forEach(c=>{if(c.open) c.send(data);}); }
            let reconnectTimer=null;
            function attemptReconnect(){
                if(amHost) return;
                if(reconnectAttempts>=MAX_RECONNECT_ATTEMPTS){ showToast('重连失败，请刷新页面'); updateConnectionUI(false,'连接失败'); return; }
                reconnectAttempts++; const delay=2000;
                updateConnectionUI(false,`重连中 ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}...`);
                if(reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer=setTimeout(()=>{ if(!roomPeerId) return; connectToHost(roomPeerId); },delay);
            }
            function connectToHost(hostId){
                if(!peer || !hostId) return;
                if(hostConn){ try{ hostConn.close(); }catch(e){} hostConn=null; }
                const conn=peer.connect(hostId,{reliable:true}); hostConn=conn;
                updateConnectionUI(false,'连接中...');
                conn.on('open',()=>{
                    updateConnectionUI(true,'已连接');
                    if (!amHost) {
                        roomIdDisplay.textContent = '房间: 已加入';
                    } else {
                        roomIdDisplay.textContent = '房间 ID: ' + hostId;
                    }
                    const autoSpectator = (gameState && gameState.phase !== 'lobby' && gameState.phase !== 'ended');
                    const finalSpectator = myInfo.spectator || autoSpectator;
                    conn.send({type:'join', name:myInfo.name, avatar:myInfo.avatar, spectator:finalSpectator});
                    if (autoSpectator && !myInfo.spectator) {
                        showToast('游戏已开始，您将自动成为观众');
                        myInfo.spectator = true;
                    }
                    reconnectAttempts=0; if(reconnectTimer) clearTimeout(reconnectTimer);
                    showToast('已加入游戏房间');
                });
                conn.on('data',data=>{
                    if(data.type==='gameState') applyGameState(data.state);
                    else if(data.type==='chat') handleIncomingChat(data);
                    else if(data.type==='announce') {
                        showAnnouncement(data.text, data.senderName);
                        addChatMessage("系统", `📢 ${data.senderName} 公告：${data.text}`, Date.now(), null);
                    }
                    else if(data.type==='timerSync' && data.remaining !== undefined) syncTimer(data.remaining);
                });
                conn.on('close',()=>{ if(intentionalDisconnect){ updateConnectionUI(false,'已离开'); return; } if(!amHost) attemptReconnect(); });
                conn.on('error',err=>{ console.error('连接错误',err); if(!intentionalDisconnect && !amHost) attemptReconnect(); });
            }
            function becomeHost(peerInstance, knownRoomId=null){
                amHost=true; roomPeerId=knownRoomId||peerInstance.id;
                gameState={ players:{}, phase:'lobby', round:0, score:0, currentWord:'', clues:{}, eliminatedClues:{}, guesserPeerId:null, lastResult:null, lastGuess:'', pendingGuess:'', wordList:[], hostHiddenClues:{} };
                gameState.players[myPeerId]={ name:myInfo.name, avatar:myInfo.avatar, joined:false, spectator:true };
                updateConnectionUI(true,'主持人模式');
                roomIdDisplay.textContent='房间 ID: '+roomPeerId;
                setPhase('lobby');
                renderAll();
                peerInstance.on('connection',conn=>{
                    hostClientConns.push(conn);
                    conn.send({type:'gameState',state:getFullState()});
                    conn.on('data',data=>{
                        if(data.type==='join'){
                            gameState.players[conn.peer]={ name:data.name, avatar:data.avatar, joined:!data.spectator, spectator:data.spectator };
                            broadcastState();
                        } else if(data.type==='clue'){
                            if(!gameState.clues) gameState.clues={};
                            gameState.clues[conn.peer]=data.clue;
                            hostProcessClues();
                        } else if(data.type==='guess'){
                            hostReceiveGuess(data.guess);
                        } else if(data.type==='chat') handleIncomingChat(data);
                        else if(data.type==='announce') {
                            showAnnouncement(data.text, data.senderName);
                            addChatMessage("系统", `📢 ${data.senderName} 公告：${data.text}`, Date.now(), null);
                            broadcastToClients(data);
                        }
                        else if(data.type==='leave'){ delete gameState.players[conn.peer]; broadcastState(); }
                    });
                    conn.on('close',()=>{ delete gameState.players[conn.peer]; hostClientConns=hostClientConns.filter(c=>c!==conn); broadcastState(); });
                });
            }
            function init(){
                if (hostParam && roomParam) {
                    let retryCount = 0;
                    const tryCreateHost = () => {
                        peer = new Peer(roomParam, { host: '0.peerjs.com', port: 443, secure: true, debug: 0 });
                        peer.on('open', (id) => {
                            myPeerId = id;
                            if (id === roomParam) {
                                becomeHost(peer, roomParam);
                                sessionStorage.removeItem('justone_host_id');
                            } else {
                                peer.destroy();
                                retryCount++;
                                if (retryCount < 3) {
                                    showToast(`主机ID被占用，重试 ${retryCount}/3...`);
                                    setTimeout(tryCreateHost, 1000);
                                } else {
                                    showToast('无法创建主机，请返回大厅重试');
                                    updateConnectionUI(false, '主机创建失败');
                                }
                            }
                        });
                        peer.on('error', (err) => {
                            peer.destroy();
                            retryCount++;
                            if (retryCount < 3) {
                                showToast(`主机创建失败，重试 ${retryCount}/3...`);
                                setTimeout(tryCreateHost, 1000);
                            } else {
                                showToast('无法创建主机，请返回大厅重试');
                                updateConnectionUI(false, '主机失败');
                            }
                        });
                    };
                    tryCreateHost();
                } else if (roomParam) {
                    peer = new Peer(undefined, { host: '0.peerjs.com', port: 443, secure: true, debug: 0 });
                    peer.on('open', (id) => { myPeerId = id; roomPeerId = roomParam; connectToHost(roomParam); });
                    peer.on('error', (err) => { updateConnectionUI(false, '连接错误'); showToast('PeerJS错误: '+err.type); });
                } else {
                    peer = new Peer(undefined, { host: '0.peerjs.com', port: 443, secure: true, debug: 0 });
                    peer.on('open', (id) => { myPeerId = id; becomeHost(peer, id); });
                    peer.on('error', (err) => { updateConnectionUI(false, '连接错误'); showToast('PeerJS错误: '+err.type); });
                }
                leaveGameBtn.classList.remove('hidden');
            }
            startGameBtn.onclick = hostStartGame;
            leaveGameBtn.onclick = () => { intentionalDisconnect=true; if(hostConn) hostConn.close(); window.location.href='index.html'; };
            clueSubmitBtn.onclick = () => {
                const clue=clueInput.value.trim(); if(!clue) return;
                if(amHost){ gameState.clues[myPeerId]=clue; clueInput.value=''; hostProcessClues(); }
                else sendToHost({type:'clue',clue});
                if(!amHost || (amHost && !isCurrentGuesser())){ clueInputArea.classList.add('hidden'); submittedStatus.classList.remove('hidden'); }
            };
            guessSubmitBtn.onclick = () => {
                const guess=guessInput.value.trim(); if(!guess) return;
                if(amHost) hostReceiveGuess(guess);
                else sendToHost({type:'guess',guess});
                guessInput.value='';
                guessSection.classList.add('hidden');
            };
            nextRoundBtn.onclick = () => { if(amHost) hostNextRound(); };
            confirmFilterBtn.onclick = () => { if(amHost) hostConfirmFilter(); };
            judgeCorrectBtn.onclick = () => { if(amHost) hostJudge(true); };
            judgeWrongBtn.onclick = () => { if(amHost) hostJudge(false); };
            setWordBtn.onclick = () => { hostSetWord(); };
            chatSendBtn.onclick = handleChatSend;
            chatInput.addEventListener('keydown',e=>{ if(e.key==='Enter') handleChatSend(); });
            hostWordInput.addEventListener('keydown',e=>{ if(e.key==='Enter') hostSetWord(); });
            init();
        })();
    </script>
</body>
</html>
