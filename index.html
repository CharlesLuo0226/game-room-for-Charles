<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮 游戏大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a14;
            --bg-panel: #11111f;
            --bg-card: #1a1a2c;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0c0;
            --accent: #e94560;
            --accent-hover: #ff6b7c;
            --accent2: #00d2ff;
            --gold: #f0c060;
            --green: #4caf84;
            --border-light: rgba(255,255,255,0.08);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.5);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.6);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Roboto', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.15) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 70%, rgba(0,210,255,0.1) 0%, transparent 60%);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .app {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 20px 28px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #e94560, #f0c060, #00d2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .room-info {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .room-badge {
            background: rgba(0,210,255,0.1);
            border: 1px solid rgba(0,210,255,0.3);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .connection-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
            box-shadow: 0 0 8px var(--green);
        }
        .connection-dot.disconnected {
            background: #ff4757;
            box-shadow: 0 0 8px #ff4757;
        }

        .copy-btn, .start-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .copy-btn:hover, .start-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        .start-btn {
            background: var(--gold);
            color: #111;
        }

        .game-select {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        /* 修复下拉框选项样式 */
        .game-select option {
            background: #2a2a3a;
            color: white;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 24px;
        }

        .my-panel {
            background: var(--bg-panel);
            border-radius: var(--radius-lg);
            padding: 28px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
        }

        .panel-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent2);
            outline: none;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        @media (max-width: 1000px) {
            .avatar-grid { grid-template-columns: repeat(6, 1fr); }
        }
        @media (max-width: 700px) {
            .avatar-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .avatar-cell {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: var(--bg-card);
            border: 3px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .avatar-cell:hover:not(.locked) {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.6);
        }
        .avatar-cell.selected {
            border-color: var(--accent2);
            box-shadow: 0 0 0 4px rgba(0,210,255,0.4);
        }
        .avatar-cell.locked {
            filter: grayscale(0.7);
            opacity: 0.5;
            cursor: not-allowed;
        }
        .avatar-cell.locked::after {
            content: '🔒';
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            padding: 2px;
        }
        .avatar-cell.mine {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(240,192,96,0.5);
        }

        .btn-row {
            display: flex;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(233,68,96,0.4);
        }
        .btn-primary:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: #ccc;
        }
        .btn-outline:hover {
            border-color: white;
            color: white;
        }
        .btn-spectator {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }
        .btn-spectator:hover {
            background: rgba(240,192,96,0.1);
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .players-panel, .chat-panel {
            background: var(--bg-panel);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border-light);
        }

        .players-panel {
            max-height: 400px;
            overflow-y: auto;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .player-card.me {
            border-color: rgba(240,192,96,0.5);
            background: rgba(240,192,96,0.08);
        }
        .player-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .player-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            min-height: 200px;
            max-height: 250px;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 12px;
        }
        .chat-msg {
            margin-bottom: 8px;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .chat-input-row {
            display: flex;
            gap: 10px;
        }
        .chat-input-row input {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .chat-input-row button {
            padding: 12px 20px;
            background: var(--accent2);
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 999;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 20px; color: #aaa; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>⚔️ 游戏大厅</h1>
        <div class="room-info">
            <div class="room-badge"><span class="connection-dot" id="connDot"></span><span id="connText">等待连接...</span></div>
            <span id="roomIdDisplay" style="font-family:monospace; font-size:0.8rem;"></span>
            <button class="copy-btn" id="copyLinkBtn" style="display:none;">📋 复制邀请链接</button>
            <select class="game-select" id="gameSelect"></select>
            <button class="start-btn" id="startGameBtn" style="display:none;">🚀 开始游戏</button>
        </div>
    </div>
    <div class="main-content">
        <div class="panel my-panel">
            <div class="panel-title"><span>🎭</span> 我的状态</div>
            <div class="input-group">
                <label>角色名称</label>
                <input type="text" id="nameInput" placeholder="输入角色名..." maxlength="16" autocomplete="off">
            </div>
            <div style="margin-bottom:8px; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">选择头像（36款）</div>
            <div class="avatar-grid" id="avatarGrid"></div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnJoin" disabled>🎯 加入游戏</button>
                <button class="btn btn-spectator" id="btnSpectate" disabled>👀 旁观</button>
                <button class="btn btn-outline" id="btnLeave" style="display:none;">🚪 退出</button>
            </div>
        </div>
        <div class="right-panel">
            <div class="panel players-panel">
                <div class="panel-title"><span>👥</span> 在线玩家 <span id="playerCount" style="font-size:0.9rem;">0</span></div>
                <div id="playersList"><div class="empty-state">🏰 等待玩家加入...</div></div>
            </div>
            <div class="panel chat-panel">
                <div class="panel-title"><span>💬</span> 聊天</div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="输入消息..." maxlength="200">
                    <button id="chatSendBtn">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    (function() {
        const AVATARS = [
            { id:0, emoji:'🐹', name:'仓鼠' }, { id:1, emoji:'🦕', name:'恐龙' }, { id:2, emoji:'🤡', name:'小丑' },
            { id:3, emoji:'🦊', name:'狐狸' }, { id:4, emoji:'🐱', name:'猫咪' }, { id:5, emoji:'🐶', name:'小狗' },
            { id:6, emoji:'🐼', name:'熊猫' }, { id:7, emoji:'🦁', name:'狮子' }, { id:8, emoji:'🐰', name:'兔子' },
            { id:9, emoji:'🐸', name:'青蛙' }, { id:10, emoji:'🦉', name:'猫头鹰' }, { id:11, emoji:'🐲', name:'龙' },
            { id:12, emoji:'🦄', name:'独角兽' }, { id:13, emoji:'🐙', name:'章鱼' }, { id:14, emoji:'🦋', name:'蝴蝶' },
            { id:15, emoji:'🐨', name:'考拉' }, { id:16, emoji:'🐯', name:'老虎' }, { id:17, emoji:'🐮', name:'奶牛' },
            { id:18, emoji:'🐷', name:'小猪' }, { id:19, emoji:'🐔', name:'小鸡' }, { id:20, emoji:'🐧', name:'企鹅' },
            { id:21, emoji:'🦆', name:'鸭子' }, { id:22, emoji:'🦅', name:'鹰' }, { id:23, emoji:'🐺', name:'狼' },
            { id:24, emoji:'🦇', name:'蝙蝠' }, { id:25, emoji:'🐻', name:'熊' }, { id:26, emoji:'🐒', name:'猴子' },
            { id:27, emoji:'🐗', name:'野猪' }, { id:28, emoji:'🐴', name:'马' }, { id:29, emoji:'🐑', name:'绵羊' },
            { id:30, emoji:'🐘', name:'大象' }, { id:31, emoji:'🦒', name:'长颈鹿' }, { id:32, emoji:'🦈', name:'鲨鱼' },
            { id:33, emoji:'🐬', name:'海豚' }, { id:34, emoji:'🦀', name:'螃蟹' }, { id:35, emoji:'🐞', name:'瓢虫' }
        ];

        const GAME_LIST = [
            { id: 'onlyone', name: '🔒 独家暗语', url: 'justone.html' },
            { id: 'drawguess', name: '🎨 画猜接龙', url: 'drawguess.html' },
            { id: 'codewar', name: '📡 截码战', url: 'codewar.html' }
        ];

        const $ = (s) => document.querySelector(s);
        const nameInput = $('#nameInput');
        const btnJoin = $('#btnJoin');
        const btnSpectate = $('#btnSpectate');
        const btnLeave = $('#btnLeave');
        const avatarGrid = $('#avatarGrid');
        const playersList = $('#playersList');
        const playerCount = $('#playerCount');
        const connDot = $('#connDot');
        const connText = $('#connText');
        const copyLinkBtn = $('#copyLinkBtn');
        const startGameBtn = $('#startGameBtn');
        const gameSelect = $('#gameSelect');
        const roomIdDisplay = $('#roomIdDisplay');
        const chatMessages = $('#chatMessages');
        const chatInput = $('#chatInput');
        const chatSendBtn = $('#chatSendBtn');

        let myPeerId = null, myConfirmed = null, myTempName = '', myTempAvatar = null;
        let peers = {}, hostConn = null, hostClientConns = [], amHost = false, roomPeerId = null, chatHistory = [];

        function populateGameSelect() {
            gameSelect.innerHTML = '<option value="">🎲 选择游戏</option>';
            GAME_LIST.forEach(g => { const o = document.createElement('option'); o.value = g.id; o.textContent = g.name; gameSelect.appendChild(o); });
        }
        function showToast(msg) { const t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
        function updateConnectionUI(ok) { connDot.className = 'connection-dot' + (ok?'':' disconnected'); connText.textContent = ok?'已连接':'未连接'; }
        function getMyDisplayName() { if(myConfirmed) return myConfirmed.name; if(myTempName) return myTempName; return '未命名'; }
        function addChatMessage(sender, text, timestamp, senderId) {
            if (senderId && senderId === myPeerId) return;
            chatHistory.push({sender, text, timestamp}); if(chatHistory.length>100) chatHistory.shift(); renderChatMessages();
        }
        function renderChatMessages() {
            chatMessages.innerHTML = chatHistory.map(m => {
                const time = new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                return `<div class="chat-msg"><span class="sender">${escapeHtml(m.sender)}:</span>${escapeHtml(m.text)}<span class="time" style="font-size:0.6rem;color:#777;margin-left:6px;">${time}</span></div>`;
            }).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function sendChatMessage() {
            const text = chatInput.value.trim(); if(!text) return;
            const timestamp = Date.now(), sender = getMyDisplayName();
            const msg = {type:'chat', sender, text, timestamp, senderId: myPeerId};
            chatInput.value = ''; chatHistory.push({sender, text, timestamp}); renderChatMessages();
            if(amHost) broadcastToClients(msg); else sendToHost(msg);
        }
        function sendToHost(data) { if(hostConn?.open) hostConn.send(data); }
        function broadcastToClients(data) { hostClientConns.forEach(c => { if(c.open) c.send(data); }); }
        function applyFullState(state) {
            peers = {}; for(const [pid, p] of Object.entries(state.players)) peers[pid] = { conn: peers[pid]?.conn, data: p }; renderAll();
        }
        function sendLocalUpdate() {
            if(myConfirmed) return;
            const upd = { type:'update', tempName:myTempName, tempAvatar:myTempAvatar };
            if(amHost) { applyLocalUpdateToHost(upd); broadcastToClients({type:'fullState', state:getFullState()}); }
            else sendToHost(upd);
        }
        function applyLocalUpdateToHost(upd) { if(!peers[myPeerId]) peers[myPeerId]={conn:null,data:{}}; const me=peers[myPeerId].data; me.tempName=upd.tempName; me.tempAvatar=upd.tempAvatar; renderAll(); }
        function confirmIdentity(spectator=false) {
            const name = myTempName.trim(), avatarId = myTempAvatar;
            if(!name || avatarId===null) return;
            const locked = {}; for(const [pid, o] of Object.entries(peers)) if(o.data.joined||o.data.spectator) locked[o.data.avatarId]=pid;
            if(locked[avatarId] && locked[avatarId]!==myPeerId) { showToast('该头像已被占用'); return; }
            myConfirmed = { name, avatarId, spectator };
            const upd = { type:'confirm', name, avatarId, spectator };
            if(amHost) { applyConfirmToHost(upd); broadcastToClients({type:'fullState', state:getFullState()}); } else sendToHost(upd);
            renderAll();
        }
        function applyConfirmToHost(upd) { if(!peers[myPeerId]) peers[myPeerId]={conn:null,data:{}}; const me=peers[myPeerId].data; me.name=upd.name; me.avatarId=upd.avatarId; me.spectator=upd.spectator; me.joined=!upd.spectator; me.tempName=upd.name; me.tempAvatar=upd.avatarId; renderAll(); }
        function leaveIdentity() {
            if(!myConfirmed) return;
            const upd = {type:'leave'}; myConfirmed=null; myTempAvatar=null; myTempName=''; nameInput.value='';
            if(amHost) { if(peers[myPeerId]) { const me=peers[myPeerId].data; me.joined=me.spectator=false; me.name=null; me.avatarId=null; } broadcastToClients({type:'fullState', state:getFullState()}); } else sendToHost(upd);
            renderAll();
        }
        function getFullState() { const players = {}; for(const [pid, o] of Object.entries(peers)) players[pid]={...o.data}; return {players}; }
        function renderAvatarGrid() {
            avatarGrid.innerHTML = ''; const locked = {};
            for(const [pid, o] of Object.entries(peers)) if((o.data.joined||o.data.spectator) && o.data.avatarId!=null) locked[o.data.avatarId]=pid;
            AVATARS.forEach(av => {
                const cell = document.createElement('div'); cell.className='avatar-cell'; cell.dataset.avatarId=av.id; cell.title=av.name;
                cell.innerHTML = `<span>${av.emoji}</span>`;
                if(locked[av.id] && locked[av.id]!==myPeerId) cell.classList.add('locked');
                else if(myConfirmed && myConfirmed.avatarId===av.id) cell.classList.add('mine');
                else if(!myConfirmed && myTempAvatar===av.id) cell.classList.add('selected');
                cell.onclick = () => {
                    if(myConfirmed) { showToast('已确认身份，请先退出再换头像'); return; }
                    if(locked[av.id] && locked[av.id]!==myPeerId) { showToast('该头像已被占用'); return; }
                    myTempAvatar = av.id; renderAvatarGrid(); updateButtonState(); sendLocalUpdate();
                };
                avatarGrid.appendChild(cell);
            });
        }
        function renderPlayersList() {
            const entries = Object.entries(peers).filter(([pid, o]) => o.data.joined||o.data.spectator);
            playerCount.textContent = entries.length;
            if(entries.length===0) { playersList.innerHTML='<div class="empty-state">🏰 等待玩家加入...</div>'; return; }
            playersList.innerHTML = entries.map(([pid, o]) => {
                const data = o.data, me = pid===myPeerId ? 'me' : '';
                const name = data.name || '未命名';
                const emoji = data.avatarId!=null ? AVATARS[data.avatarId]?.emoji : '❓';
                const cls = data.joined ? 'joined' : 'spectating', text = data.joined ? '已加入 ✓' : '旁观中';
                return `<div class="player-card ${me}"><div class="player-avatar">${emoji}</div><div style="flex:1;"><div class="player-name">${escapeHtml(name)}</div><span class="status-tag" style="font-size:0.6rem;background:rgba(0,210,255,0.15);padding:1px 6px;border-radius:8px;">${text}</span></div></div>`;
            }).join('');
        }
        function updateButtonState() {
            const hasName = nameInput.value.trim().length>0, hasAvatar = myTempAvatar!==null;
            if(myConfirmed) { btnJoin.style.display='none'; btnSpectate.style.display='none'; btnLeave.style.display='inline-block'; nameInput.disabled=true; }
            else { btnJoin.style.display='inline-block'; btnSpectate.style.display='inline-block'; btnLeave.style.display='none'; nameInput.disabled=false; btnJoin.disabled=!(hasName && hasAvatar); btnSpectate.disabled=!(hasName && hasAvatar); }
        }
        function renderAll() { renderAvatarGrid(); renderPlayersList(); updateButtonState(); renderChatMessages(); const disp = amHost?'inline-block':'none'; gameSelect.style.display=disp; startGameBtn.style.display=disp; }
        function handleIncomingChat(data) { addChatMessage(data.sender, data.text, data.timestamp, data.senderId); if(amHost) broadcastToClients(data); }

        function startGame() {
            const selectedGameId = gameSelect.value;
            if(!selectedGameId) { showToast('请先选择一个游戏'); return; }
            const game = GAME_LIST.find(g => g.id === selectedGameId);
            if(!game) return;
            const baseUrl = game.url;
            const hostPeerId = myPeerId;
            sessionStorage.setItem('justone_host_id', hostPeerId);
            const startMsg = { type: 'gameStart', gameId: selectedGameId, gameUrl: baseUrl, hostPeerId: hostPeerId, timestamp: Date.now() };
            addChatMessage('系统', `🚀 游戏「${game.name}」开始！正在进入...`, Date.now());
            broadcastToClients(startMsg);
            jumpToGame(baseUrl, hostPeerId, true);
        }
        function jumpToGame(url, hostId, isHost) {
            const params = new URLSearchParams();
            params.set('room', hostId);
            if (isHost) params.set('host', '1');
            if(myConfirmed) {
                params.set('name', myConfirmed.name);
                params.set('avatar', myConfirmed.avatarId);
                params.set('spectator', myConfirmed.spectator ? '1' : '0');
            } else {
                params.set('name', getMyDisplayName());
                params.set('avatar', myTempAvatar ?? '');
                params.set('spectator', '0');
            }
            setTimeout(() => { window.location.href = url + '?' + params.toString(); }, 800);
        }
        function handleGameStart(data) {
            const game = GAME_LIST.find(g => g.id === data.gameId);
            const gameName = game ? game.name : '未知游戏';
            addChatMessage('系统', `🚀 游戏「${gameName}」开始！正在进入...`, Date.now());
            const isHost = (myPeerId === data.hostPeerId);
            jumpToGame(data.gameUrl, data.hostPeerId, isHost);
        }

        function becomeHost(peer) {
            amHost = true; roomPeerId = peer.id;
            peers[myPeerId] = { conn: null, data: { tempName:'', tempAvatar:null, joined:false, spectator:false } };
            updateConnectionUI(true); roomIdDisplay.textContent = '房间 ID: ' + roomPeerId;
            copyLinkBtn.style.display = 'inline-block'; showToast('你是主机，分享链接给其他人加入');
            renderAll();
            peer.on('connection', conn => {
                hostClientConns.push(conn);
                if(!peers[conn.peer]) peers[conn.peer] = { conn, data: { tempName:'', tempAvatar:null, joined:false, spectator:false } };
                else peers[conn.peer].conn = conn;
                conn.send({type:'fullState', state:getFullState()}); broadcastToClients({type:'fullState',state:getFullState()}); renderAll();
                conn.on('data', data => {
                    if(data.type === 'update') { if(!peers[conn.peer]) peers[conn.peer]={conn,data:{}}; const p=peers[conn.peer].data; p.tempName=data.tempName; p.tempAvatar=data.tempAvatar; broadcastToClients({type:'fullState',state:getFullState()}); renderAll(); }
                    else if(data.type === 'confirm') { if(!peers[conn.peer]) peers[conn.peer]={conn,data:{}}; const p=peers[conn.peer].data; p.name=data.name; p.avatarId=data.avatarId; p.spectator=data.spectator; p.joined=!data.spectator; broadcastToClients({type:'fullState',state:getFullState()}); renderAll(); }
                    else if(data.type === 'leave') { if(peers[conn.peer]) { const p=peers[conn.peer].data; p.joined=p.spectator=false; p.name=null; p.avatarId=null; broadcastToClients({type:'fullState',state:getFullState()}); renderAll(); } }
                    else if(data.type === 'chat') handleIncomingChat(data);
                });
                conn.on('close', () => { delete peers[conn.peer]; hostClientConns = hostClientConns.filter(c => c!==conn); broadcastToClients({type:'fullState',state:getFullState()}); renderAll(); });
            });
            copyLinkBtn.onclick = () => { const link = location.origin + location.pathname + '?room=' + roomPeerId; navigator.clipboard.writeText(link).then(() => showToast('邀请链接已复制！')); };
        }
        function joinRoom(hostPeerId, peer) {
            amHost = false; roomPeerId = hostPeerId;
            const conn = peer.connect(hostPeerId, { reliable: true }); hostConn = conn;
            updateConnectionUI(false); connText.textContent = '正在连接房间...';
            conn.on('open', () => { updateConnectionUI(true); connText.textContent = '已加入房间'; showToast('成功加入房间！'); });
            conn.on('data', data => {
                if(data.type === 'fullState') { applyFullState(data.state); if(!peers[myPeerId]) peers[myPeerId]={conn:null,data:{tempName:'',tempAvatar:null,joined:false,spectator:false}}; renderAll(); }
                else if(data.type === 'chat') addChatMessage(data.sender, data.text, data.timestamp, data.senderId);
                else if(data.type === 'gameStart') handleGameStart(data);
            });
            conn.on('close', () => { updateConnectionUI(false); connText.textContent = '连接断开，请刷新'; showToast('与主机断开连接'); });
        }

        nameInput.addEventListener('input', () => { if(myConfirmed) return; myTempName = nameInput.value.trim(); updateButtonState(); sendLocalUpdate(); });
        btnJoin.onclick = () => confirmIdentity(false);
        btnSpectate.onclick = () => confirmIdentity(true);
        btnLeave.onclick = leaveIdentity;
        chatSendBtn.onclick = sendChatMessage;
        chatInput.addEventListener('keydown', e => { if(e.key==='Enter') sendChatMessage(); });
        startGameBtn.onclick = startGame;
        function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

        function init() {
            populateGameSelect();
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            const peer = new Peer(undefined, { host:'0.peerjs.com', port:443, secure:true, debug:0 });
            peer.on('open', id => {
                myPeerId = id;
                if(!roomParam) { becomeHost(peer); }
                else { roomPeerId = roomParam; peers[myPeerId] = { conn:null, data:{tempName:'',tempAvatar:null,joined:false,spectator:false} }; joinRoom(roomParam, peer); roomIdDisplay.textContent = '加入房间: ' + roomPeerId; }
            });
            peer.on('error', err => { updateConnectionUI(false); connText.textContent = '连接失败: ' + err.type; showToast('连接失败，请刷新重试'); });
            renderAll();
        }
        init();
    })();
</script>
</body>
</html>
